# whatspyc channel directory.
#
# The WPS application protocol has no "list available channels" RPC — the
# server only sends per-channel data for channels you're already
# subscribed to. The web client hardcodes its directory in the JS bundle
# (`reference/web-client/index.js`, the `eh = [...]` array). whatspyc
# mirrors that idea here: the channel list is just a config file you can
# edit, with the same starting set as the production web client at the
# time this file was generated.
#
# `whatspyc` writes this file to ~/.config/whatspyc/channels.toml on
# first run if it isn't there yet, then never touches it again — so any
# edits you make are preserved across upgrades. Add, remove, or rename
# entries freely. Each entry needs a `cid` (integer); `name` and
# `description` are optional but make `/list` easier to read.

[[channels]]
cid = 0
name = "packet-network"
description = "All things packet network related - links, routing, NETROM, QUALITY, INP3 etc."

[[channels]]
cid = 1
name = "packet-general"
description = "Anything Packet Radio goes here!"

